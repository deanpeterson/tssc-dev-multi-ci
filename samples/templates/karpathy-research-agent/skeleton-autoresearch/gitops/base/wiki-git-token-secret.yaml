# Git PAT for the wiki repo.
#
# Plaintext in git is intentional for v1 — matches the existing
# unsealed-Secret pattern in this cluster (see
# redhat-ai-research-wiki-git-token created via the original
# wiki flow). The token's allowlist is the new
# <ghOwner>/<name>-wiki repo only, so blast radius on leak is
# bounded.
#
# Migration target: sealed-secrets or external-secrets. See
# follow-up issue in agent-office-operator backlog.
apiVersion: v1
kind: Secret
metadata:
  name: ${{ values.name }}-wiki-git-token
  namespace: ${{ values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-office
    agentoffice.ai/autoresearch-project: ${{ values.name }}
type: Opaque
stringData:
  GIT_TOKEN: ${{ values.wikiGitToken }}
