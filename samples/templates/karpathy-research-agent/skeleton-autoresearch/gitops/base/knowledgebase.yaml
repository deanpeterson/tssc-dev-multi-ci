apiVersion: agentoffice.ai/v1alpha1
kind: KnowledgeBase
metadata:
  name: ${{ values.name }}-wiki
  namespace: ${{ values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-office
    agentoffice.ai/autoresearch-project: ${{ values.name }}
spec:
  displayName: "${{ values.displayName }} Wiki"
  description: |
    Per-project knowledge base for the ${{ values.name }} QLoRA
    fine-tuning loop. The experimenter agent reads log/log.md
    before proposing each new round and writes proposals/round-N.md
    + results/round-N.md after each cycle.
  gatewayRef:
    name: research-gateway
  gitMirror:
    branch: ${{ values.defaultBranch }}
    cadence: "*/5 * * * *"
    credentialsSecretRef: ${{ values.name }}-wiki-git-token
    url: ${{ values.wikiRepoURL }}
  storage:
    size: 5Gi
