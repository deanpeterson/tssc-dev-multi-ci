{%- if values.quayRobotUsername and values.quayRobotPassword %}
# Quay push secret for the trainer's `oras push` step. The
# trainer's runtime path reads this secret via the in-pod SA
# token (no platforms.kubernetes mount required), so the only
# thing this CR is doing is making the secret available in the
# project's namespace.
#
# Encoded as dockerconfigjson — exactly the shape `oras push
# --registry-config` accepts.
apiVersion: v1
kind: Secret
metadata:
  name: quay-push-secret
  namespace: ${{ values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-office
    agentoffice.ai/autoresearch-project: ${{ values.name }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "quay-quay-quay-test.apps.salamander.aimlworkbench.com": {
          "auth": "${{ (values.quayRobotUsername + ':' + values.quayRobotPassword) | b64encode }}"
        }
      }
    }
{%- else %}
# (no Quay robot provided; relying on cluster's existing
# quay-push-secret in the target namespace)
{%- endif %}
