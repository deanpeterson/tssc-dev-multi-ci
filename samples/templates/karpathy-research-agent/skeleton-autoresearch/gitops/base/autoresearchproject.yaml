apiVersion: agentoffice.ai/v1alpha1
kind: AutoResearchProject
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-office
    agentoffice.ai/role: autoresearch
spec:
  displayName: ${{ values.displayName }}
  validationMode: ${{ values.validationMode }}

  baseModel:
    huggingfaceId: ${{ values.baseModel }}
    revision: ${{ values.baseModelRevision }}

  trainingData:
    huggingfaceDataset: ${{ values.dataset }}
    split: ${{ values.trainingSplit }}
    sampleCount: ${{ values.trainingSampleCount }}

  eval:
    metric: ${{ values.evalMetric }}
    direction: ${{ values.evalDirection }}

  loopConfig:
    cadenceMinutes: ${{ values.cadenceMinutes }}
    maxConcurrentRuns: ${{ values.maxConcurrentRuns }}
    maxTotalExperiments: ${{ values.maxTotalExperiments }}

  experimenter:
    workstation: ${{ values.name }}-experimenter

  knowledgeBase: ${{ values.name }}-wiki

  # pipelineRef is required by the CRD: it tells the operator
  # which Tekton/DSP pipeline to launch for each training round.
  # The operator pre-creates `autoresearch-qlora-train-eval` in the
  # `agent-office` namespace during install (see
  # cluster/operator/pipeline.yaml in agent-office gitops). Override
  # if you've forked the pipeline.
  pipelineRef:
    name: autoresearch-qlora-train-eval
    namespace: agent-office

{%- if values.modelRegistryInstance %}
  adapterStorage:
    modelRegistry:
      registryInstance: ${{ values.modelRegistryInstance }}
{%- endif %}
