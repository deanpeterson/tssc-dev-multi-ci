apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  title: ${{ values.displayName }}
  description: ${{ values.description }}
  links:
    - url: "https://devspaces.apps.salamander.aimlworkbench.com/#https://github.com/${{ values.ghOwner }}/${{ values.name }}-autoresearch-gitops"
      title: "Open GitOps in Dev Spaces"
      icon: catalog
      type: devspaces
    - url: ${{ values.wikiRepoURL }}
      title: "Open Wiki on GitHub"
      icon: catalog
    - url: "https://devspaces.apps.salamander.aimlworkbench.com/#${{ values.wikiRepoURL }}"
      title: "Edit Wiki in Dev Spaces"
      icon: catalog
      type: devspaces
  annotations:
    argocd/app-name: ${{ values.name }}-autoresearch
    backstage.io/kubernetes-id: ${{ values.name }}
    agentoffice.ai/base-model: ${{ values.baseModel }}
    agentoffice.ai/dataset: ${{ values.dataset }}
  tags:
    - ai
    - autoresearch
    - qlora
    - openshift
spec:
  type: ai-loop
  owner: ${{ values.owner }}
  lifecycle: experimental
