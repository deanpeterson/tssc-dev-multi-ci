apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: karpathy-research-agent
  title: Karpathy Auto-Research Agent / Project
  description: >-
    Two modes:
      1. Web research agent — a focused web-research AgentWorkstation
         that joins the shared research-gateway runtime.
      2. Autoresearch project — full Karpathy-style QLoRA fine-tuning
         loop: AutoResearchProject + per-project wiki (KnowledgeBase)
         + experimenter AgentWorkstation + ModelRegistry-backed
         baseModel picker + the GitHub repo for the wiki, plus every
         Secret needed (git PAT, optional Quay robot). The PAT scope
         is validated at step time via publish:github so bad auth
         never reaches the cluster.
  tags:
    - ai
    - agent
    - openclaw
    - research
    - autoresearch
    - openshift
    - qlora
spec:
  owner: user:default/deanpeterson
  type: service

  parameters:
    # =====================================================================
    # Step 1: kind picker. Drives which subsequent steps appear.
    # =====================================================================
    - title: What are you creating?
      required:
        - kind
      properties:
        kind:
          title: Kind
          type: string
          description: >-
            "Web research agent" creates one AgentWorkstation that
            watches a topic on the web. "Autoresearch project" creates
            the full QLoRA loop bundle (project + wiki + experimenter
            agent + ModelRegistry binding + every Secret) — base model
            picked live from the cluster's Model Registry.
          enum:
            - web-research-agent
            - autoresearch-project
          enumNames:
            - Web research agent (single agent)
            - Autoresearch project (QLoRA loop, full bundle)
          default: autoresearch-project

    # =====================================================================
    # Step 2: web-research-agent identity + topic (only shown when
    #         kind = web-research-agent).
    # =====================================================================
    - title: Web Research Agent
      dependencies:
        kind:
          oneOf:
            - properties:
                kind:
                  const: web-research-agent
              required:
                - name
                - displayName
                - topic
                - owner
              properties:
                kind:
                  type: string
                name:
                  title: Agent Name
                  type: string
                  description: Lowercase, DNS-safe.
                  pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
                  maxLength: 63
                  ui:autofocus: true
                displayName:
                  title: Display Name
                  type: string
                emoji:
                  title: Emoji
                  type: string
                  default: "🔬"
                  maxLength: 2
                topic:
                  title: Research Topic
                  type: string
                  ui:widget: textarea
                  ui:options:
                    rows: 4
                extraDirective:
                  title: Additional Directive (optional)
                  type: string
                  ui:widget: textarea
                  ui:options:
                    rows: 4
                owner:
                  title: Owner
                  type: string
                  ui:field: EntityPicker
                  ui:options:
                    catalogFilter:
                      kind:
                        - Group
                        - User
                namespace:
                  title: Namespace
                  type: string
                  default: agent-office
                gatewayRef:
                  title: AgentGateway
                  type: string
                  default: research-gateway
                discordChannelUrl:
                  title: Discord Channel URL (optional)
                  type: string
                  default: https://discord.com/channels/@me
                ghOwner:
                  title: GitHub Owner
                  type: string
                  default: enterprisewebservice
            - properties:
                kind:
                  const: autoresearch-project

    # =====================================================================
    # Step 3 (AUTORESEARCH MODE): Base Model — PICKED FIRST so the rest
    # of the form can default off it. The picker is fed live from the
    # operator's /backstage/catalog.yaml endpoint (Model Registry as
    # source of truth).
    # =====================================================================
    - title: Base Model (from Model Registry)
      dependencies:
        kind:
          oneOf:
            - properties:
                kind:
                  const: web-research-agent
            - properties:
                kind:
                  const: autoresearch-project
              required:
                - baseModel
                - owner
              properties:
                kind:
                  type: string
                baseModel:
                  title: Base Model
                  type: string
                  description: >-
                    Live dropdown of every model in the cluster's
                    Model Registry. Add new models via the RHOAI
                    Dashboard → Model Registry; they appear here
                    on the next catalog poll (~100s).
                  ui:field: EntityPicker
                  ui:options:
                    catalogFilter:
                      kind: Resource
                      spec.type: ml-model
                baseModelCustomURI:
                  title: Custom URI Override (optional)
                  type: string
                  description: >-
                    Free-text override for models NOT in the registry
                    yet. Wins over the picker above if set.
                  default: ""
                baseModelRevision:
                  title: Base Model Revision
                  type: string
                  description: branch/tag/commit (ignored for OCI URIs)
                  default: main
                owner:
                  title: Owner
                  type: string
                  ui:field: EntityPicker
                  ui:options:
                    catalogFilter:
                      kind:
                        - Group
                        - User

    # =====================================================================
    # Step 4 (AUTORESEARCH MODE): Training — all sane defaults. The
    # power user can adjust; the casual user can hit Next.
    # =====================================================================
    - title: Training (defaults shown — adjust if needed)
      dependencies:
        kind:
          oneOf:
            - properties:
                kind:
                  const: web-research-agent
            - properties:
                kind:
                  const: autoresearch-project
              properties:
                kind:
                  type: string
                dataset:
                  title: Training Dataset (Hugging Face)
                  type: string
                  description: Code-gen baseline. Override with any HF dataset id.
                  default: ise-uiuc/Magicoder-OSS-Instruct-75K
                trainingSplit:
                  title: Training Split
                  type: string
                  default: train
                trainingSampleCount:
                  title: Training Sample Count Cap
                  type: integer
                  default: 2000
                evalMetric:
                  title: Eval Metric
                  type: string
                  default: eval_loss
                evalDirection:
                  title: Eval Direction
                  type: string
                  enum: [minimize, maximize]
                  default: minimize
                cadenceMinutes:
                  title: Cadence (minutes between rounds)
                  type: integer
                  default: 30
                maxConcurrentRuns:
                  title: Max Concurrent Runs
                  type: integer
                  default: 1
                maxTotalExperiments:
                  title: Max Total Experiments
                  type: integer
                  default: 100
                validationMode:
                  title: Start in validation mode (10-step smoke tests first)
                  type: boolean
                  description: Recommended for the first cycle. Flip off to start real training.
                  default: false

    # =====================================================================
    # Step 5 (AUTORESEARCH MODE): Wiki, Quay, Model Registry.
    # =====================================================================
    - title: Wiki + Persistence (PAT required)
      dependencies:
        kind:
          oneOf:
            - properties:
                kind:
                  const: web-research-agent
            - properties:
                kind:
                  const: autoresearch-project
              required:
                - wikiGitToken
              properties:
                kind:
                  type: string
                wikiGitToken:
                  title: GitHub PAT for the new wiki repo
                  type: string
                  description: >-
                    Fine-grained PAT with "Contents: Read and write"
                    on the new <ghOwner>/<project>-wiki repo. The
                    template validates this BEFORE any cluster apply
                    via publish:github — bad scope fails loud here,
                    not silently inside the cluster.
                  ui:widget: password
                quayRobotUsername:
                  title: Quay Robot Username (optional)
                  type: string
                  default: ""
                quayRobotPassword:
                  title: Quay Robot Password (optional)
                  type: string
                  ui:widget: password
                  default: ""
                quayNamespace:
                  title: Quay Namespace
                  type: string
                  default: deanpeterson
                modelRegistryInstance:
                  title: ModelRegistry Instance
                  type: string
                  description: Existing instance to register adapters into.
                  default: autoresearch-registry
                experimenterPromptExtra:
                  title: Experimenter Extra Directive (optional)
                  type: string
                  ui:widget: textarea
                  ui:options:
                    rows: 4
                emoji:
                  title: Emoji
                  type: string
                  default: "🔬"
                  maxLength: 2
                namespace:
                  title: OpenShift Namespace
                  type: string
                  default: agent-office
                ghOwner:
                  title: GitHub Owner
                  type: string
                  default: enterprisewebservice
                nameOverride:
                  title: Project Name Override (optional)
                  type: string
                  description: >-
                    Auto-derived from the picked model name if left
                    blank. Provide a custom name only if you want
                    something other than the default.
                  pattern: "^([a-z0-9][a-z0-9-]*[a-z0-9])?$"
                  default: ""

  # =======================================================================
  # Steps.
  # =======================================================================
  steps:
    # ------- web-research-agent path -------
    - id: fetch-web-research
      name: Fetch Web-Research Skeleton
      if: ${{ parameters.kind === "web-research-agent" }}
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: gitops
        values:
          name: ${{ parameters.name }}
          displayName: ${{ parameters.displayName }}
          emoji: ${{ parameters.emoji }}
          topic: ${{ parameters.topic }}
          extraDirective: ${{ parameters.extraDirective }}
          gatewayRef: ${{ parameters.gatewayRef }}
          namespace: ${{ parameters.namespace }}
          discordChannelUrl: ${{ parameters.discordChannelUrl }}
          owner: ${{ parameters.owner }}
          ghOwner: ${{ parameters.ghOwner }}
          repoURL: https://github.com/${{ parameters.ghOwner }}/${{ parameters.name }}-research-agent-gitops
          defaultBranch: main
          argoNS: openshift-gitops
          argoProject: default

    - id: publish-gitops-web-research
      name: Publish GitOps (web-research)
      if: ${{ parameters.kind === "web-research-agent" }}
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.ghOwner }}&repo=${{ parameters.name }}-research-agent-gitops
        sourcePath: gitops
        defaultBranch: main
        repoVisibility: public
        gitAuthorName: Dean Peterson
        gitAuthorEmail: deanpeterson@users.noreply.github.com
        description: "GitOps manifests for Karpathy research agent: ${{ parameters.displayName }}"

    - id: argocd-register-web-research
      name: Register in ArgoCD (web-research)
      if: ${{ parameters.kind === "web-research-agent" }}
      action: argocd:create-resources
      input:
        appName: ${{ parameters.name }}-research-agent
        argoInstance: default
        namespace: ${{ parameters.namespace }}
        repoUrl: ${{ steps['publish-gitops-web-research'].output.remoteUrl }}
        path: overlays/development

    - id: catalog-register-web-research
      name: Register in Catalog (web-research)
      if: ${{ parameters.kind === "web-research-agent" }}
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-gitops-web-research'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    # ------- autoresearch-project path -------
    - id: resolve-base-model
      name: Resolve Base Model from Registry
      if: ${{ parameters.kind === "autoresearch-project" and parameters.baseModel and parameters.baseModel.length > 0 }}
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.baseModel }}

    - id: fetch-autoresearch
      name: Fetch Autoresearch-Project Skeleton
      if: ${{ parameters.kind === "autoresearch-project" }}
      action: fetch:template
      input:
        url: ./skeleton-autoresearch
        targetPath: gitops
        values:
          # Project name: user override > sanitized(registeredModel-modelVersion) > fallback
          name: ${{ parameters.nameOverride if parameters.nameOverride else (steps['resolve-base-model'].output.entity.metadata.annotations['agentoffice.ai/registered-model'] + '-autoresearch' if steps['resolve-base-model'].output else 'autoresearch-project') | replace('/', '-') | replace('.', '-') | lower }}
          # Display name: from picked entity title; falls back to the entity name; falls back to a generic.
          displayName: ${{ 'AutoResearch: ' + (steps['resolve-base-model'].output.entity.metadata.title if steps['resolve-base-model'].output and steps['resolve-base-model'].output.entity.metadata.title else (parameters.baseModelCustomURI if parameters.baseModelCustomURI else 'Karpathy Loop')) }}
          # Description: derived; no human typing.
          description: ${{ 'Karpathy-style autoresearch loop fine-tuning ' + (parameters.baseModelCustomURI if parameters.baseModelCustomURI else steps['resolve-base-model'].output.entity.metadata.annotations['agentoffice.ai/model-uri']) + ' on ' + parameters.dataset + '.' }}
          emoji: ${{ parameters.emoji }}
          namespace: ${{ parameters.namespace }}
          owner: ${{ parameters.owner }}
          ghOwner: ${{ parameters.ghOwner }}
          # baseModel resolution: customURI wins, else picked entity URI (huggingface://... stripped), else granite default.
          baseModel: ${{ parameters.baseModelCustomURI if parameters.baseModelCustomURI else (steps['resolve-base-model'].output.entity.metadata.annotations['agentoffice.ai/model-uri'] | replace('huggingface://', '') if steps['resolve-base-model'].output else 'ibm-granite/granite-4.1-8b') }}
          baseModelRevision: ${{ parameters.baseModelRevision }}
          dataset: ${{ parameters.dataset }}
          trainingSplit: ${{ parameters.trainingSplit }}
          trainingSampleCount: ${{ parameters.trainingSampleCount }}
          evalMetric: ${{ parameters.evalMetric }}
          evalDirection: ${{ parameters.evalDirection }}
          cadenceMinutes: ${{ parameters.cadenceMinutes }}
          maxConcurrentRuns: ${{ parameters.maxConcurrentRuns }}
          maxTotalExperiments: ${{ parameters.maxTotalExperiments }}
          validationMode: ${{ parameters.validationMode }}
          wikiGitToken: ${{ secrets.wikiGitToken }}
          quayRobotUsername: ${{ parameters.quayRobotUsername }}
          quayRobotPassword: ${{ secrets.quayRobotPassword }}
          quayNamespace: ${{ parameters.quayNamespace }}
          modelRegistryInstance: ${{ parameters.modelRegistryInstance }}
          experimenterPromptExtra: ${{ parameters.experimenterPromptExtra }}
          # URL templates (depend on the derived name).
          repoURL: https://github.com/${{ parameters.ghOwner }}/${{ (parameters.nameOverride if parameters.nameOverride else (steps['resolve-base-model'].output.entity.metadata.annotations['agentoffice.ai/registered-model'] + '-autoresearch' if steps['resolve-base-model'].output else 'autoresearch-project')) | replace('/', '-') | replace('.', '-') | lower }}-autoresearch-gitops
          wikiRepoURL: https://github.com/${{ parameters.ghOwner }}/${{ (parameters.nameOverride if parameters.nameOverride else (steps['resolve-base-model'].output.entity.metadata.annotations['agentoffice.ai/registered-model'] + '-autoresearch' if steps['resolve-base-model'].output else 'autoresearch-project')) | replace('/', '-') | replace('.', '-') | lower }}-wiki
          gitopsRepoURL: https://github.com/${{ parameters.ghOwner }}/${{ (parameters.nameOverride if parameters.nameOverride else (steps['resolve-base-model'].output.entity.metadata.annotations['agentoffice.ai/registered-model'] + '-autoresearch' if steps['resolve-base-model'].output else 'autoresearch-project')) | replace('/', '-') | replace('.', '-') | lower }}-autoresearch-gitops
          defaultBranch: main
          argoNS: openshift-gitops
          argoProject: default

    # Publish the wiki repo first — bad-scope PAT fails LOUD here.
    - id: publish-wiki
      name: Publish Wiki Repository
      if: ${{ parameters.kind === "autoresearch-project" }}
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.ghOwner }}&repo=${{ (parameters.nameOverride if parameters.nameOverride else (steps['resolve-base-model'].output.entity.metadata.annotations['agentoffice.ai/registered-model'] + '-autoresearch' if steps['resolve-base-model'].output else 'autoresearch-project')) | replace('/', '-') | replace('.', '-') | lower }}-wiki
        sourcePath: gitops/wiki-seed
        defaultBranch: main
        repoVisibility: private
        gitAuthorName: Dean Peterson
        gitAuthorEmail: deanpeterson@users.noreply.github.com
        description: Autoresearch wiki — agent-written proposals + results.
        token: ${{ secrets.wikiGitToken }}

    - id: publish-gitops-autoresearch
      name: Publish GitOps (autoresearch-project)
      if: ${{ parameters.kind === "autoresearch-project" }}
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.ghOwner }}&repo=${{ (parameters.nameOverride if parameters.nameOverride else (steps['resolve-base-model'].output.entity.metadata.annotations['agentoffice.ai/registered-model'] + '-autoresearch' if steps['resolve-base-model'].output else 'autoresearch-project')) | replace('/', '-') | replace('.', '-') | lower }}-autoresearch-gitops
        sourcePath: gitops/gitops
        defaultBranch: main
        repoVisibility: public
        gitAuthorName: Dean Peterson
        gitAuthorEmail: deanpeterson@users.noreply.github.com
        description: GitOps manifests for autoresearch project.

    - id: wait-repo
      name: Wait for Repository
      if: ${{ parameters.kind === "autoresearch-project" }}
      action: debug:wait
      input:
        seconds: 3

    - id: argocd-register-autoresearch
      name: Register in ArgoCD (autoresearch-project)
      if: ${{ parameters.kind === "autoresearch-project" }}
      action: argocd:create-resources
      input:
        appName: ${{ (parameters.nameOverride if parameters.nameOverride else (steps['resolve-base-model'].output.entity.metadata.annotations['agentoffice.ai/registered-model'] + '-autoresearch' if steps['resolve-base-model'].output else 'autoresearch-project')) | replace('/', '-') | replace('.', '-') | lower }}-autoresearch
        argoInstance: default
        namespace: ${{ parameters.namespace }}
        repoUrl: ${{ steps['publish-gitops-autoresearch'].output.remoteUrl }}
        path: overlays/development

    - id: catalog-register-autoresearch
      name: Register in Catalog (autoresearch-project)
      if: ${{ parameters.kind === "autoresearch-project" }}
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-gitops-autoresearch'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitOps Repository (web-research)
        url: ${{ steps['publish-gitops-web-research'].output.remoteUrl }}
        if: ${{ parameters.kind === "web-research-agent" }}
      - title: GitOps Repository (autoresearch)
        url: ${{ steps['publish-gitops-autoresearch'].output.remoteUrl }}
        if: ${{ parameters.kind === "autoresearch-project" }}
      - title: Wiki Repository
        url: ${{ steps['publish-wiki'].output.remoteUrl }}
        if: ${{ parameters.kind === "autoresearch-project" }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['catalog-register-web-research'].output.entityRef or steps['catalog-register-autoresearch'].output.entityRef }}
