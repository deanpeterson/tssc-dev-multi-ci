# PAT for the wiki repo. Same pattern as the autoresearch-project
# template — plaintext in gitops for v1, planned migration to
# sealed-secrets. The PAT must have "Contents: Read and write" on
# the new <ghOwner>/<name>-wiki repo; the template's publish:github
# step validates that scope BEFORE this manifest reaches the cluster.
apiVersion: v1
kind: Secret
metadata:
  name: ${{ values.name }}-wiki-git-token
  namespace: ${{ values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-office
    agentoffice.ai/kb-creator: ${{ values.name }}
type: Opaque
stringData:
  GIT_TOKEN: ${{ values.wikiGitToken }}
