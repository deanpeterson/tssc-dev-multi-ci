apiVersion: agentoffice.ai/v1alpha1
kind: KnowledgeBase
metadata:
  name: ${{ values.name }}-wiki
  namespace: ${{ values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-office
    agentoffice.ai/kb-creator: ${{ values.name }}
spec:
  displayName: "${{ values.displayName }} Wiki"
  description: |
    Knowledge base built by the ${{ values.name }} research agent.
    The agent watches its topic on the web, files findings here,
    and answers follow-up questions from this curated knowledge
    rather than re-deriving from scratch.
  gatewayRef:
    name: ${{ values.gatewayRef }}
  gitMirror:
    branch: ${{ values.defaultBranch }}
    cadence: "*/5 * * * *"
    credentialsSecretRef: ${{ values.name }}-wiki-git-token
    url: ${{ values.wikiRepoURL }}
  storage:
    size: 5Gi
